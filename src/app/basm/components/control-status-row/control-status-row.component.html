<ion-item *ngIf="control" lines="full">
  <ion-label>
    <div class="ctrl-name-row">
      <ion-badge [color]="indicatorColor" class="status-badge">
        {{ control.status?.indicator | uppercase }}
      </ion-badge>
      <strong>{{ control.name }}</strong>
      <ion-badge *ngIf="hasException" color="tertiary" class="exception-badge">
        Eccezione
      </ion-badge>
    </div>
    <p class="ctrl-id">{{ control.control_id }}</p>

    <div class="confidence-row">
      <span>Confidence {{ confidencePercent }}%</span>
      <ion-progress-bar
        [value]="control.verification?.confidence_score ?? 0"
        [color]="confidencePercent > 60 ? 'success' : 'warning'">
      </ion-progress-bar>
    </div>

    <div class="meta-row">
      <basm-staleness-badge [status]="stalenessStatus"></basm-staleness-badge>
      <ion-note>
        {{ control.verification?.method }} |
        {{ control.verification?.last_verified | date:'dd/MM/yy' }}
      </ion-note>
    </div>

    <div *ngIf="control.mapping?.iso27001 || control.mapping?.nis2" class="mapping-row">
      <ion-chip *ngIf="control.mapping?.iso27001" outline color="medium">
        <ion-label>ISO {{ control.mapping.iso27001 }}</ion-label>
      </ion-chip>
      <ion-chip *ngIf="control.mapping?.nis2" outline color="medium">
        <ion-label>NIS2 {{ control.mapping.nis2 }}</ion-label>
      </ion-chip>
    </div>
  </ion-label>
</ion-item>
