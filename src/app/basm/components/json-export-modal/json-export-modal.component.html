<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Esporta JSON — {{ doc?.identity_context?.app_id }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="action-bar">
    <ion-button fill="outline" size="small" (click)="copyToClipboard()">
      <ion-icon slot="start" [name]="copied ? 'checkmark-outline' : 'copy-outline'"></ion-icon>
      {{ copied ? 'Copiato!' : 'Copia' }}
    </ion-button>
    <ion-button fill="solid" size="small" (click)="downloadFile()">
      <ion-icon slot="start" name="download-outline"></ion-icon>
      Scarica .json
    </ion-button>
  </div>

  <pre class="json-preview">{{ prettyJson }}</pre>

</ion-content>
